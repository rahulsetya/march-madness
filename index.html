<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>March Madness 2026 Bet Tracker</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #222635;
    --border: #2e3347;
    --text: #e8eaf6;
    --text-muted: #8892b0;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --green: #00e676;
    --red: #ff1744;
    --yellow: #ffd740;
    --live: #2979ff;
    --card-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  .light {
    --bg: #f0f2f8;
    --surface: #ffffff;
    --surface2: #e8ecf5;
    --border: #d0d5e8;
    --text: #1a1d27;
    --text-muted: #5a6380;
    --card-shadow: 0 4px 20px rgba(0,0,0,0.1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; transition: background 0.3s, color 0.3s; }

  /* HEADER */
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: var(--card-shadow); }
  .header h1 { font-size: 1.4rem; font-weight: 700; background: linear-gradient(135deg, #6c63ff, #ff6584); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .live-indicator { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: var(--live); font-weight: 600; }
  .live-dot { width: 8px; height: 8px; background: var(--live); border-radius: 50%; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.5; transform:scale(1.3); } }
  .theme-btn, .admin-btn, .refresh-btn, .builder-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; transition: all 0.2s; }
  .theme-btn:hover, .admin-btn:hover, .refresh-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .builder-btn { background: rgba(108,99,255,0.15); border-color: rgba(108,99,255,0.4); color: #a89cf7; font-weight: 600; }
  .builder-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* BET BUILDER */
  .builder-modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; width: 90%; max-width: 680px; max-height: 88vh; overflow-y: auto; display: flex; flex-direction: column; }
  .builder-header { padding: 20px 24px 0; position: sticky; top: 0; background: var(--surface); z-index: 1; border-bottom: 1px solid var(--border); padding-bottom: 14px; }
  .builder-header h2 { font-size: 1.1rem; font-weight: 700; }
  .builder-header p { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; }
  .builder-games { padding: 12px 20px; display: flex; flex-direction: column; gap: 8px; }
  .builder-row { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; display: grid; grid-template-columns: 60px 1fr 110px; gap: 10px; align-items: center; transition: border-color 0.2s; }
  .builder-row.selected { border-color: var(--accent); }
  .builder-time { font-size: 0.68rem; color: var(--text-muted); font-weight: 600; line-height: 1.3; }
  .builder-teams { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .builder-team-btn { flex: 1; min-width: 80px; padding: 6px 8px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); font-size: 0.78rem; font-weight: 500; cursor: pointer; transition: all 0.15s; text-align: center; }
  .builder-team-btn:hover { border-color: var(--accent); color: var(--text); }
  .builder-team-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700; }
  .builder-vs { font-size: 0.65rem; color: var(--text-muted); flex-shrink: 0; }
  .builder-odds-col { display: flex; flex-direction: column; gap: 4px; }
  .builder-odds-input { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 6px 8px; color: var(--text); font-size: 0.82rem; width: 100%; text-align: center; }
  .builder-odds-input:focus { outline: none; border-color: var(--accent); }
  .builder-towin { font-size: 0.65rem; color: var(--green); text-align: center; font-weight: 600; min-height: 14px; }
  .builder-footer { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; position: sticky; bottom: 0; background: var(--surface); }
  .builder-count { font-size: 0.8rem; color: var(--text-muted); }
  .builder-count span { color: var(--accent); font-weight: 700; }
  .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .refresh-btn:disabled:hover { background: var(--surface2); color: var(--text); border-color: var(--border); }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinning { display: inline-block; animation: spin 0.7s linear infinite; }

  /* STATS BAR */
  .stats-bar { display: flex; flex-wrap: wrap; gap: 12px; padding: 16px 24px; background: var(--surface); border-bottom: 1px solid var(--border); }
  .stats-toggle { display: none; width: 100%; text-align: center; padding: 5px; background: var(--surface); border-bottom: 1px solid var(--border); cursor: pointer; font-size: 0.7rem; color: var(--text-muted); user-select: none; }
  .stats-toggle:hover { color: var(--text); }
  @media (max-width: 600px) {
    .stats-toggle { display: block; }
    .stats-bar.collapsed { display: none; }
  }
  .stat-card { flex: 1; min-width: 110px; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; text-align: center; }
  .stat-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 4px; }
  .stat-value { font-size: 1.2rem; font-weight: 700; }
  .stat-value.green { color: var(--green); }
  .stat-value.red { color: var(--red); }
  .stat-value.yellow { color: var(--yellow); }
  .stat-value.live { color: var(--live); }


  /* FILTER TABS */
  .filter-bar { padding: 12px 24px; display: flex; gap: 8px; flex-wrap: wrap; }
  .tab { padding: 7px 18px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface2); color: var(--text-muted); cursor: pointer; font-size: 0.82rem; font-weight: 500; transition: all 0.2s; }
  .tab:hover { border-color: var(--accent); color: var(--text); }
  .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  .tab .badge { display: inline-block; margin-left: 6px; background: rgba(255,255,255,0.25); border-radius: 10px; padding: 1px 7px; font-size: 0.72rem; }

  /* BETS GRID */
  .bets-container { padding: 8px 24px 32px; }
  .bets-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; }

  /* BET CARD */
  .bet-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; position: relative; }
  .bet-card:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.3); }
  .bet-card.won { border-color: var(--green); }
  .bet-card.lost { border-color: var(--red); opacity: 0.75; }
  .bet-card.live { border-color: var(--live); }
  .bet-card.live::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background: var(--live); animation: shimmer 2s infinite; }
  @keyframes shimmer { 0% {opacity:0.5} 50% {opacity:1} 100% {opacity:0.5} }

  .card-header { padding: 12px 14px 8px; display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .team-info { flex: 1; }
  .team-logo { width: 36px; height: 36px; object-fit: contain; flex-shrink: 0; }
  .team-logo-sm { width: 20px; height: 20px; object-fit: contain; flex-shrink: 0; }
  .pick-team { font-size: 1.2rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .vs-line { font-size: 0.85rem; color: var(--text-muted); margin-top: 2px; display: flex; align-items: center; gap: 4px; }
  .bet-type-badge { font-size: 0.65rem; background: rgba(108,99,255,0.2); color: #a89cf7; border: 1px solid rgba(108,99,255,0.3); border-radius: 6px; padding: 2px 7px; white-space: nowrap; }

  .status-badge { padding: 4px 10px; border-radius: 8px; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap; }
  .status-badge.pending { background: rgba(255,215,64,0.15); color: var(--yellow); border: 1px solid rgba(255,215,64,0.3); }
  .status-badge.live { background: rgba(41,121,255,0.15); color: var(--live); border: 1px solid rgba(41,121,255,0.4); animation: pulse 1.5s infinite; }
  .status-badge.won { background: rgba(0,230,118,0.15); color: var(--green); border: 1px solid rgba(0,230,118,0.3); }
  .status-badge.lost { background: rgba(255,23,68,0.15); color: var(--red); border: 1px solid rgba(255,23,68,0.3); }

  .score-section { padding: 6px 14px 10px; display: flex; align-items: center; gap: 8px; }
  .score-box { display: flex; align-items: center; gap: 6px; background: var(--surface2); border-radius: 8px; padding: 5px 10px; font-size: 0.85rem; flex: 1; }
  .score-team { font-size: 0.72rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 110px; }
  .score-val { font-size: 1.1rem; font-weight: 800; }
  .score-divider { color: var(--text-muted); font-weight: 300; }
  .game-clock { font-size: 0.68rem; color: var(--text-muted); text-align: center; padding: 0 14px 6px; }

  .card-financials { padding: 8px 14px 12px; display: flex; gap: 8px; }
  .fin-item { flex: 1; text-align: center; background: var(--surface2); border-radius: 8px; padding: 6px 8px; }
  .fin-label { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); }
  .fin-value { font-size: 0.9rem; font-weight: 700; margin-top: 2px; }
  .fin-value.odds { color: var(--yellow); }
  .fin-value.payout { color: var(--green); }

  .card-footer { padding: 8px 14px 10px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: flex-end; }
  .result-profit { font-size: 0.85rem; font-weight: 700; }
  .result-profit.positive { color: var(--green); }
  .result-profit.negative { color: var(--red); }

  /* ADMIN MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; backdrop-filter: blur(4px); align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px; width: 90%; max-width: 520px; max-height: 85vh; overflow-y: auto; }
  .modal h2 { font-size: 1.2rem; margin-bottom: 20px; }
  .modal-close { float: right; background: none; border: none; color: var(--text-muted); font-size: 1.4rem; cursor: pointer; line-height: 1; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 0.78rem; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.06em; }
  .form-group input, .form-group select { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; color: var(--text); font-size: 0.9rem; }
  .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--accent); }
  .form-row { display: flex; gap: 10px; }
  .form-row .form-group { flex: 1; }
  .btn-primary { width: 100%; background: var(--accent); border: none; color: #fff; padding: 10px; border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; margin-top: 8px; transition: opacity 0.2s; }
  .btn-primary:hover { opacity: 0.85; }
  .btn-danger { background: rgba(255,23,68,0.15); border: 1px solid rgba(255,23,68,0.4); color: var(--red); padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; }
  .btn-danger:hover { background: rgba(255,23,68,0.3); }
  .admin-bet-list { margin-top: 16px; display: flex; flex-direction: column; gap: 8px; }
  .admin-bet-row { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; display: flex; align-items: center; justify-content: space-between; gap: 8px; cursor: pointer; }
  .admin-bet-row:hover { border-color: var(--accent); }
  .admin-bet-name { font-size: 0.85rem; font-weight: 600; }
  .admin-bet-meta { font-size: 0.72rem; color: var(--text-muted); }
  .password-screen { text-align: center; }
  .password-screen h3 { margin-bottom: 16px; }
  .password-screen input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text); font-size: 1rem; text-align: center; letter-spacing: 0.1em; }
  .password-screen input:focus { outline: none; border-color: var(--accent); }
  .error-msg { color: var(--red); font-size: 0.8rem; margin-top: 8px; }

  /* UPDATE TICKER */
  .update-bar { position: fixed; bottom: 16px; right: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 8px 14px; font-size: 0.75rem; color: var(--text-muted); box-shadow: var(--card-shadow); }

  .empty-state { text-align: center; padding: 60px 24px; color: var(--text-muted); }
  .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }

  @media (max-width: 600px) {
    .header { padding: 12px 16px; }
    .header h1 { font-size: 1.1rem; }
    .stats-bar, .filter-bar, .bets-container { padding-left: 14px; padding-right: 14px; }
    .bets-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

const ADMIN_PASSWORD = "madness2026";

const DEFAULT_BETS = [

  { id:30, pick:"Furman", opponent:"UConn", betType:"ML", odds:"+1700", risk:15, toWin:255.00, payout:270.00, status:"pending" },
  { id:31, pick:"Missouri", opponent:"Miami (FL)", betType:"ML", odds:"+110", risk:15, toWin:16.50, payout:31.50, status:"pending" },
  { id:32, pick:"Prairie View A&M", opponent:"Florida", betType:"ML", odds:"+5000", risk:15, toWin:750.00, payout:765.00, status:"pending" }
];

let bets = [];
let liveScores = {};
let activeFilter = "ALL";
let adminAuthed = false;
let editingBetId = null;
let isDark = true;

// ─── Init ───────────────────────────────────────────────────────────────────
function init() {
  const savedTheme = localStorage.getItem(THEME_KEY);
  if (savedTheme === "light") { isDark = false; document.body.classList.add("light"); updateThemeBtn(); }

  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    try {
      const parsed = JSON.parse(saved);
      bets = parsed.length > 0 ? parsed : DEFAULT_BETS.map(b => ({...b}));
      // Deduplicate existing bets by pick+opponent (keep first occurrence)
      const seenKeys = new Set();
      bets = bets.filter(b => {
        const key = b.pick.toLowerCase() + "|" + b.opponent.toLowerCase();
        if (seenKeys.has(key)) return false;
        seenKeys.add(key); return true;
      });
      // Merge any new DEFAULT_BETS not yet in saved data
      DEFAULT_BETS.forEach(d => {
        const key = d.pick.toLowerCase() + "|" + d.opponent.toLowerCase();
        if (!seenKeys.has(key)) { bets.push({...d}); seenKeys.add(key); }
      });
    } catch { bets = DEFAULT_BETS.map(b => ({...b})); }
  } else {
    bets = DEFAULT_BETS.map(b => ({...b}));
  }
  saveBets();
  render();
  fetchScores();
  scheduleRefresh();
}

function saveBets() { localStorage.setItem(STORAGE_KEY, JSON.stringify(bets)); }

// ─── Theme ───────────────────────────────────────────────────────────────────
function toggleStats() {
  const bar = document.getElementById("statsBar");
  const toggle = document.getElementById("statsToggle");
  const collapsed = bar.classList.toggle("collapsed");
  toggle.textContent = collapsed ? "Stats ▾" : "Stats ▴";
}

function toggleTheme() {
  isDark = !isDark;
  document.body.classList.toggle("light", !isDark);
  localStorage.setItem(THEME_KEY, isDark ? "dark" : "light");
  updateThemeBtn();
}

// ─── Fetch Scores ─────────────────────────────────────────────────────────────
async function manualRefresh() {
  const btn = document.getElementById("refreshBtn");
  const icon = document.getElementById("refreshIcon");
  btn.disabled = true;
  icon.classList.add("spinning");
  await fetchScores();
  icon.classList.remove("spinning");
  btn.disabled = false;
}

async function fetchScores() {
  try {
    const res = await fetch(PROXY_URL, { signal: AbortSignal.timeout(10000) });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    processScores(data);
    document.getElementById("updateBar").textContent = "Last updated: " + new Date().toLocaleTimeString();
  } catch(e) {
    console.warn("Score fetch failed:", e.message);
    document.getElementById("updateBar").textContent = "Live scores unavailable — " + new Date().toLocaleTimeString();
  }
}

let refreshTimer = null;
function scheduleRefresh() {
  clearTimeout(refreshTimer);
  const hour = new Date().getHours();
  if (hour >= 2 && hour < 11) {
    // Sleep until 11am
    const resume = new Date(); resume.setHours(11, 0, 0, 0);
    refreshTimer = setTimeout(async () => { await fetchScores(); scheduleRefresh(); }, resume - Date.now());
    return;
  }
  const hasLive = bets.some(b => b.status === "live");
  refreshTimer = setTimeout(async () => { await fetchScores(); scheduleRefresh(); }, hasLive ? 30000 : 180000);
}

function processScores(games) {
  liveScores = {};
  if (!Array.isArray(games)) return;
  // Store full game objects indexed by id only; matching done in findGame
  games.forEach(g => { liveScores[g.id] = g; });
  autoResolve(games);
  render();
}

// Returns a match score (higher = better) for how well a query matches a team name.
// Aliases for bet names that differ from ESPN display names
const TEAM_ALIASES = {
  // ESPN name: "Pennsylvania Quakers"
  "upenn": "pennsylvania",
  "penn": "pennsylvania",
  // ESPN name: "California Baptist Lancers"
  "cal baptist": "california baptist",
  // ESPN name: "Queens University Royals"
  "queens (n.c.)": "queens",
  "queens university": "queens",
  // ESPN name: "Long Island University Sharks"
  "long island": "long island university",
  "liu": "long island university",
  // ESPN name: "Miami (OH) RedHawks"
  "miami (ohio)": "miami redhawks",
  "miami oh": "miami redhawks",
  // ESPN name: "Miami Hurricanes"
  "miami (fl)": "miami hurricanes",
  "miami fl": "miami hurricanes",
  // ESPN name: "St. John's Red Storm"
  "st. john's": "saint john's",
  // ESPN name: "Prairie View A&M Panthers"
  "prairie view a&m": "prairie view",
  // ESPN name: "College of Charleston" variants
  "college of charleston": "charleston",
};

function normalize(s) {
  return String(s)
    .toLowerCase()
    .normalize("NFD")                        // decompose accented chars
    .replace(/[\u0300-\u036f]/g, "")         // strip combining diacritics
    .replace(/[\u02BB\u02BC\u2018\u2019'`]/g, "") // strip okina + smart/straight quotes
    .trim();
}

function matchScore(query, teamName) {
  let q = normalize(query);
  const t = normalize(teamName);
  // Apply alias (e.g. upenn → pennsylvania)
  q = TEAM_ALIASES[q] || q;
  if (q === t) return 100;
  const tWords = t.split(/\s+/);
  const qWords = q.split(/\s+/);
  const allMatch = qWords.every(qw => tWords.some(tw => tw === qw));
  if (allMatch && qWords.length === tWords.length) return 90;
  // Score by coverage ratio — "texas" covers 1/2 of "texas longhorns" (score 75)
  // but only 1/3 of "texas a&m aggies" (score ~73), so longhorns wins
  if (allMatch) return 70 + (qWords.length / tWords.length) * 10;
  if (tWords.slice(0, qWords.length).join(" ") === q) return 60;
  return 0;
}

function findGame(bet) {
  const games = Object.values(liveScores);
  let bestGame = null;
  let bestScore = 0;
  for (const g of games) {
    if (!g.homeTeam || !g.awayTeam) continue;
    const s = Math.max(
      matchScore(bet.pick, g.homeTeam),
      matchScore(bet.pick, g.awayTeam),
      matchScore(bet.opponent, g.homeTeam),
      matchScore(bet.opponent, g.awayTeam)
    );
    // Prefer final/live games over pre-games on equal score
    const priority = g.status !== "pre" ? 1 : 0;
    if (s > bestScore || (s === bestScore && s > 0 && priority > (bestGame?.status !== "pre" ? 1 : 0))) {
      bestScore = s; bestGame = g;
    }
  }
  return bestScore > 0 ? bestGame : null;
}

function autoResolve(games) {
  let changed = false;
  bets.forEach(bet => {
    const game = findGame(bet);
    if (!game) return;
    if (game.status === "final") {
      const homeScore = parseInt(game.homeScore) || 0;
      const awayScore = parseInt(game.awayScore) || 0;
      const pickIsHome = matchScore(bet.pick, game.homeTeam) >= matchScore(bet.pick, game.awayTeam);
      let won;
      if (pickIsHome) { won = homeScore > awayScore; }
      else { won = awayScore > homeScore; }
      const newStatus = won ? "won" : "lost";
      if (bet.status !== newStatus) { bet.status = newStatus; bet.resolvedAt = Date.now(); changed = true; }
    } else if (game.status === "in") {
      // Always trust live data — override any stale resolved status
      if (bet.status !== "live") { bet.status = "live"; changed = true; }
    } else if (game.status === "pre") {
      // Game hasn't started — revert live back to pending (handles restarts/delays)
      if (bet.status === "live") { bet.status = "pending"; changed = true; }
    }
  });
  if (changed) saveBets();
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  renderStats();
  renderTabs();
  renderBets();
}

function renderStats() {
  const won = bets.filter(b => b.status === "won").length;
  const lost = bets.filter(b => b.status === "lost").length;
  const live = bets.filter(b => b.status === "live").length;
  const pending = bets.filter(b => b.status === "pending").length;
  const totalRisked = bets.filter(b => b.status !== "pending").reduce((s, b) => s + b.risk, 0);
  const pendingRisked = bets.filter(b => b.status === "pending").reduce((s, b) => s + b.risk, 0);
  const totalWon = bets.filter(b => b.status === "won").reduce((s, b) => s + b.toWin, 0);
  const netPL = totalWon - (lost * 15);
  const settledRisk = (won + lost) * 15;
  const roi = settledRisk > 0 ? (netPL / settledRisk) * 100 : null;
  document.getElementById("liveIndicator").style.display = live > 0 ? "flex" : "none";
  document.getElementById("statsBar").innerHTML = `
    <div class="stat-card"><div class="stat-label">Record</div><div class="stat-value">${won}W - ${lost}L</div></div>
    <div class="stat-card"><div class="stat-label">Placed · Pending Start</div><div class="stat-value yellow">$${pendingRisked.toFixed(2)}</div></div>
    <div class="stat-card"><div class="stat-label">Total Risked</div><div class="stat-value">$${totalRisked.toFixed(2)}</div></div>
    <div class="stat-card"><div class="stat-label">Net P&L</div><div class="stat-value ${netPL >= 0 ? 'green' : 'red'}">${netPL >= 0 ? '+' : ''}$${netPL.toFixed(2)}</div></div>
    <div class="stat-card"><div class="stat-label">ROI</div><div class="stat-value ${roi === null ? '' : roi >= 0 ? 'green' : 'red'}">${roi === null ? '—' : (roi >= 0 ? '+' : '') + roi.toFixed(1) + '%'}</div></div>
    <div class="stat-card"><div class="stat-label">Live Now</div><div class="stat-value live">${live}</div></div>
    <div class="stat-card"><div class="stat-label">Pending</div><div class="stat-value yellow">${pending}</div></div>
  `;
}

function renderTabs() {
  const counts = { ALL: bets.length, LIVE: 0, PENDING: 0, WON: 0, LOST: 0 };
  bets.forEach(b => {
    const s = b.status.toUpperCase();
    if (counts[s] !== undefined) counts[s]++;
  });
  const tabs = ["ALL","LIVE","PENDING","WON","LOST"];
  document.getElementById("filterBar").innerHTML = tabs.map(t =>
    `<button class="tab ${activeFilter===t?'active':''}" onclick="setFilter('${t}')">${t}<span class="badge">${counts[t]}</span></button>`
  ).join("");
}

function setFilter(f) { activeFilter = f; render(); }

const STATUS_ORDER = { live: 0, pending: 1, won: 2, lost: 3 };

function renderBets() {
  const filtered = bets
    .filter(b => activeFilter === "ALL" || b.status.toUpperCase() === activeFilter)
    .sort((a, b) => {
      const sd = (STATUS_ORDER[a.status] ?? 9) - (STATUS_ORDER[b.status] ?? 9);
      if (sd !== 0) return sd;
      // Within won/lost, most recently resolved first
      if ((a.status === "won" || a.status === "lost") && a.resolvedAt && b.resolvedAt)
        return b.resolvedAt - a.resolvedAt;
      return 0;
    });
  const grid = document.getElementById("betsGrid");
  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="icon">🏀</div><p>No bets in this category</p></div>`;
    return;
  }
  grid.innerHTML = filtered.map(b => renderBetCard(b)).join("");
}

function renderBetCard(bet) {
  const game = findGame(bet);
  const status = bet.status;

  // Resolve logos and seeds from live score data
  const pickIsHome = game && matchScore(bet.pick, game.homeTeam) >= matchScore(bet.pick, game.awayTeam);
  const pickLogo = game ? (pickIsHome ? game.homeLogo : game.awayLogo) : "";
  const oppLogo  = game ? (pickIsHome ? game.awayLogo : game.homeLogo) : "";
  const pickSeed = game ? (pickIsHome ? game.homeSeed : game.awaySeed) : null;
  const oppSeed  = game ? (pickIsHome ? game.awaySeed : game.homeSeed) : null;

  let scoreHTML = "";
  let clockHTML = "";
  if (game && status === "pending" && game.startTime) {
    const tipoff = new Date(game.startTime).toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit", timeZone: "America/New_York" });
    const venueLabel = [game.venue, game.venueCity].filter(Boolean).join(" · ");
    const venueStr = venueLabel ? `<span style="color:var(--text-muted)">📍 ${escHtml(venueLabel)}</span>` : "";
    const tvStr = game.tv ? `<span style="color:var(--text-muted)">📺 ${escHtml(game.tv)}</span>` : "";
    const details = [venueStr, tvStr].filter(Boolean).join("&ensp;·&ensp;");

    // Pre-game odds from DraftKings
    let pregameOddsHTML = "";
    if (game.odds) {
      const pickML = pickIsHome ? game.odds.homeML : game.odds.awayML;
      const oppML  = pickIsHome ? game.odds.awayML  : game.odds.homeML;
      const fmtML  = v => !v ? "—" : (String(v).startsWith("-") || String(v).startsWith("+") ? v : "+" + v);
      const mlColor = v => !v ? "var(--text-muted)" : (String(v).startsWith("-") ? "#ef4444" : "#22c55e");
      const parts = [];
      if (pickML) parts.push(`<span style="font-weight:700"><span style="color:var(--text-primary)">${escHtml(bet.pick)}</span> <span style="color:${mlColor(pickML)}">${fmtML(pickML)}</span></span>`);
      if (oppML)  parts.push(`<span style="color:var(--text-muted)">${escHtml(bet.opponent)} <span style="color:${mlColor(oppML)}">${fmtML(oppML)}</span></span>`);
      if (game.odds.spread) parts.push(`<span style="color:var(--text-muted)">Spread: <span style="color:var(--text-primary)">${escHtml(game.odds.spread)}</span></span>`);
      if (game.odds.overUnder) parts.push(`<span style="color:var(--text-muted)">O/U <span style="color:var(--text-primary)">${game.odds.overUnder}</span></span>`);
      if (parts.length) {
        pregameOddsHTML = `<div style="font-size:0.7rem;color:var(--text-muted);display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin-top:2px">
          ${parts.join('<span style="opacity:0.4">·</span>')}
          <span style="opacity:0.4;font-size:0.65rem">via ${escHtml(game.odds.provider)}</span>
        </div>`;
      }
    }

    scoreHTML = `<div style="padding:8px 14px;display:flex;flex-direction:column;gap:4px;font-size:0.75rem;text-align:center">
      <div class="game-clock" style="padding:0">Tip-off ${tipoff} EST</div>
      ${details ? `<div style="font-size:0.72rem">${details}</div>` : ""}
      ${pregameOddsHTML}
    </div>`;
  }
  if (game && game.status !== "pre" && (status === "live" || status === "won" || status === "lost")) {
    const home = game.homeTeam || ""; const away = game.awayTeam || "";
    const hs = game.homeScore ?? ""; const as = game.awayScore ?? "";

    // TV + clock info shown to the right of the score
    const clockStr = [game.period, game.clock].filter(Boolean).join(" • ");
    const infoRightHTML = status === "live" ? `
      <div style="display:flex;flex-direction:column;align-items:flex-end;justify-content:center;gap:4px;padding-left:10px;border-left:1px solid var(--card-border);min-width:64px">
        ${game.tv ? `<span style="font-size:0.72rem;color:var(--text-primary);font-weight:600">📺 ${escHtml(game.tv)}</span>` : ""}
        ${clockStr ? `<span style="font-size:0.7rem;color:var(--text-muted)">${escHtml(clockStr)}</span>` : ""}
      </div>` : "";

    // Win probability bar between score box and financials
    let winProbHTML = "";
    if (status === "live" && game.winProb) {
      const pickWinPct = pickIsHome ? game.winProb.home : game.winProb.away;
      const oppWinPct  = pickIsHome ? game.winProb.away : game.winProb.home;
      winProbHTML = `
        <div style="padding:8px 14px 4px;font-size:0.7rem;color:var(--text-muted)">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px">
            <span style="font-weight:700"><span style="color:var(--text-primary)">${escHtml(bet.pick)}</span> <span style="color:${pickWinPct > 50 ? '#22c55e' : '#ef4444'}">${pickWinPct}%</span></span>
            <span style="color:var(--text-muted)">Win Probability</span>
            <span style="font-weight:700"><span style="color:${oppWinPct > 50 ? '#22c55e' : '#ef4444'}">${oppWinPct}%</span> <span style="color:var(--text-primary)">${escHtml(bet.opponent)}</span></span>
          </div>
          <div style="height:5px;border-radius:3px;background:var(--card-border);overflow:hidden">
            <div style="height:100%;width:${pickWinPct}%;background:${pickWinPct > 50 ? '#22c55e' : '#ef4444'};border-radius:3px;transition:width 0.5s"></div>
          </div>
        </div>`;
    }

    scoreHTML = `
      <div class="score-section">
        <div class="score-box" style="display:flex;align-items:center;justify-content:space-between">
          <div style="display:flex;align-items:center;gap:10px">
            <div>
              <div class="score-team" title="${escHtml(away)}">${escHtml(away)}</div>
              <div class="score-val">${as}</div>
            </div>
            <div class="score-divider">-</div>
            <div>
              <div class="score-team" title="${escHtml(home)}">${escHtml(home)}</div>
              <div class="score-val">${hs}</div>
            </div>
          </div>
          ${infoRightHTML}
        </div>
      </div>${winProbHTML}`;
    if (status !== "live" && (game.clock || game.period)) {
      clockHTML = `<div class="game-clock">${game.period ? game.period + " • " : ""}${game.clock || ""}</div>`;
    }
  }
  let profitHTML = "";
  if (status === "won") profitHTML = `<span class="result-profit positive">+$${bet.toWin.toFixed(2)}</span>`;
  else if (status === "lost") profitHTML = `<span class="result-profit negative">-$${bet.risk.toFixed(2)}</span>`;

  const logoImg = pickLogo ? `<img class="team-logo" src="${escHtml(pickLogo)}" alt="">` : "";

  return `
    <div class="bet-card ${status}" id="card-${bet.id}">
      <div class="card-header">
        <div class="team-info">
          <div class="pick-team">${logoImg}<span>${escHtml(bet.pick)}</span>${pickSeed ? `<span style="font-size:0.7rem;color:var(--text-muted);font-weight:500;margin-left:3px">#${pickSeed}</span>` : ""}</div>
          <div class="vs-line">vs ${oppLogo ? `<img class="team-logo-sm" src="${escHtml(oppLogo)}" alt="">` : ""}${escHtml(bet.opponent)}${oppSeed ? `<span style="font-size:0.7rem;color:var(--text-muted);font-weight:500;margin-left:3px">#${oppSeed}</span>` : ""}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px">
          <span class="bet-type-badge">${escHtml(bet.betType)}</span>
          <span class="status-badge ${status}">${status.toUpperCase()}</span>
        </div>
      </div>
      ${scoreHTML}${clockHTML}
      <div class="card-financials">
        <div class="fin-item"><div class="fin-label">Odds</div><div class="fin-value odds">${escHtml(bet.odds)}</div></div>
        <div class="fin-item"><div class="fin-label">Risk</div><div class="fin-value">$${bet.risk.toFixed(2)}</div></div>
        <div class="fin-item"><div class="fin-label">To Win</div><div class="fin-value">$${bet.toWin.toFixed(2)}</div></div>
        <div class="fin-item"><div class="fin-label">Payout</div><div class="fin-value payout">$${bet.payout.toFixed(2)}</div></div>
      </div>
      <div class="card-footer">
        ${profitHTML}
      </div>
    </div>`;
}

function escHtml(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

      <div style="padding:10px 14px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:0.78rem;color:var(--text-muted)">Ready: <strong id="builderReadyCount" style="color:var(--accent)">0</strong> bets</span>
        <button class="btn-primary" style="width:auto;margin:0;padding:8px 20px" onclick="confirmBuilderBets()">✓ Confirm &amp; Add Bets</button>
      </div>
    </div>
    <div id="addBetForm" style="display:none; margin-bottom:20px; background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:14px;">
      <h3 style="margin-bottom:12px; font-size:0.95rem;">New Bet</h3>
      <div class="form-group"><label>Pick Team</label><input id="n_pick" placeholder="Team name" list="teams-list" autocomplete="off"></div>
      <div class="form-group"><label>Opponent</label><input id="n_opp" placeholder="Opponent" list="teams-list" autocomplete="off"></div>
      <div class="form-row">
        <div class="form-group"><label>Odds</label><input id="n_odds" placeholder="+200" oninput="calcPayout('n')"></div>
        <div class="form-group"><label>Bet Type</label><input id="n_type" value="ML"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Risk ($)</label><input id="n_risk" type="number" step="0.01" placeholder="15" oninput="calcPayout('n')"></div>
        <div class="form-group"><label>To Win ($)</label><input id="n_towin" type="number" step="0.01" placeholder="—" readonly style="opacity:0.6;cursor:not-allowed"></div>
      </div>
      <div class="form-group"><label>Payout ($)</label><input id="n_payout" type="number" step="0.01" placeholder="—" readonly style="opacity:0.6;cursor:not-allowed"></div>
      <button class="btn-primary" onclick="addNewBet()">Add Bet</button>
    </div>
    <div style="font-size:0.78rem;color:var(--text-muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.06em;">Bets — click to edit</div>
    <div class="admin-bet-list">
      ${bets.map(b => `
        <div class="admin-bet-row" onclick="editingBetId=${b.id};renderAdminContent()">
          <div>
            <div class="admin-bet-name">${escHtml(b.pick)} vs ${escHtml(b.opponent)}</div>
            <div class="admin-bet-meta">${escHtml(b.odds)} • Risk $${b.risk} • Status: ${b.status}</div>
          </div>
          <span class="status-badge ${b.status}" style="font-size:0.65rem;padding:3px 8px">${b.status}</span>
        </div>`).join("")}
    </div>
    <div style="margin-top:20px;border-top:1px solid var(--border);padding-top:16px;">
      <button class="btn-danger" onclick="resetAllBets()">Reset All Bets to Default</button>
    </div>
  `;
}

function showAddBetForm() {
  const f = document.getElementById("addBetForm");
  f.style.display = f.style.display === "none" ? "block" : "none";
}

function calcPayout(prefix) {
  const oddsStr = (document.getElementById(prefix + "_odds")?.value || "").trim();
  const risk = parseFloat(document.getElementById(prefix + "_risk")?.value) || 0;
  const oddsNum = parseFloat(oddsStr);
  if (!oddsNum || !risk) return;
  let toWin;
  if (oddsNum > 0) toWin = risk * (oddsNum / 100);
  else toWin = risk * (100 / Math.abs(oddsNum));
  toWin = Math.round(toWin * 100) / 100;
  const payout = Math.round((risk + toWin) * 100) / 100;
  document.getElementById(prefix + "_towin").value = toWin.toFixed(2);
  document.getElementById(prefix + "_payout").value = payout.toFixed(2);
}

function addNewBet() {
  const pick = document.getElementById("n_pick").value.trim();
  const opp = document.getElementById("n_opp").value.trim();
  const odds = document.getElementById("n_odds").value.trim();
  const type = document.getElementById("n_type").value.trim() || "ML";
  const risk = parseFloat(document.getElementById("n_risk").value) || 15;
  const toWin = parseFloat(document.getElementById("n_towin").value) || 0;
  const payout = parseFloat(document.getElementById("n_payout").value) || (risk + toWin);
  if (!pick || !opp) return alert("Please enter pick and opponent.");
  const newId = Math.max(...bets.map(b => b.id), 0) + 1;
  bets.push({ id: newId, pick, opponent: opp, betType: type, odds, risk, toWin, payout, status: "pending" });
  saveBets(); render(); renderAdminContent();
}

function saveBetEdit(id) {
  const bet = bets.find(b => b.id === id);
  if (!bet) return;
  bet.pick = document.getElementById("e_pick").value.trim();
  bet.opponent = document.getElementById("e_opp").value.trim();
  bet.betType = document.getElementById("e_type").value.trim();
  bet.odds = document.getElementById("e_odds").value.trim();
  bet.risk = parseFloat(document.getElementById("e_risk").value) || bet.risk;
  bet.toWin = parseFloat(document.getElementById("e_towin").value) || bet.toWin;
  bet.payout = parseFloat(document.getElementById("e_payout").value) || bet.payout;
  bet.status = document.getElementById("e_status").value;
  saveBets(); render();
  editingBetId = null; renderAdminContent();
}

function deleteBet(id) {
  if (!confirm("Delete this bet?")) return;
  bets = bets.filter(b => b.id !== id);
  if (bets.length === 0) bets = DEFAULT_BETS.map(b => ({...b}));
  saveBets(); render();
  editingBetId = null; renderAdminContent();
}

function resetAllBets() {
  if (!confirm("Reset all bets to defaults? This cannot be undone.")) return;
  bets = DEFAULT_BETS.map(b => ({...b}));
  saveBets(); render(); renderAdminContent();
}

// ─── Bet Builder ──────────────────────────────────────────────────────────────
const DAY2_GAMES = [
  { time:"9:25 PM",  team1:"Prairie View A&M", team2:"Florida" },
];

// state: { pick: "team1"|"team2"|null, odds: "" }
let builderState = DAY2_GAMES.map(() => ({ pick: null, odds: "" }));

function toggleBuilderSection() {
  const sec = document.getElementById("builderSection");
  const isHidden = sec.style.display === "none";
  sec.style.display = isHidden ? "block" : "none";
  if (isHidden) {
    builderState = DAY2_GAMES.map(() => ({ pick: null, odds: "" }));
    renderBuilderGames();
  }
}

function renderBuilderGames() {
  document.getElementById("builderGames").innerHTML = DAY2_GAMES.map((g, i) => {
    const s = builderState[i];
    const toWinStr = calcBuilderToWin(i);
    return `
      <div class="builder-row ${s.pick ? 'selected' : ''}" id="brow-${i}">
        <div class="builder-time">${g.time}<br>EST</div>
        <div class="builder-teams">
          <button class="builder-team-btn ${s.pick==='team1'?'active':''}" onclick="selectBuilderPick(${i},'team1')">${escHtml(g.team1)}</button>
          <span class="builder-vs">vs</span>
          <button class="builder-team-btn ${s.pick==='team2'?'active':''}" onclick="selectBuilderPick(${i},'team2')">${escHtml(g.team2)}</button>
        </div>
        <div class="builder-odds-col">
          <input class="builder-odds-input" id="bodds-${i}" placeholder="e.g. +400"
            value="${escHtml(s.odds)}" oninput="onBuilderOdds(${i},this.value)">
          <div class="builder-towin" id="btowin-${i}">${toWinStr}</div>
        </div>
      </div>`;
  }).join("");
  updateBuilderCount();
}

function selectBuilderPick(i, which) {
  builderState[i].pick = builderState[i].pick === which ? null : which;
  const row = document.getElementById(`brow-${i}`);
  row.querySelectorAll(".builder-team-btn").forEach((b,j) => {
    b.classList.toggle("active", builderState[i].pick === (j===0?"team1":"team2"));
  });
  row.classList.toggle("selected", !!builderState[i].pick);
  updateBuilderCount();
}

function onBuilderOdds(i, val) {
  builderState[i].odds = val;
  document.getElementById(`btowin-${i}`).textContent = calcBuilderToWin(i);
  updateBuilderCount();
}

function calcBuilderToWin(i) {
  const s = builderState[i];
  const odds = parseFloat(s.odds);
  if (!odds || !s.pick) return "";
  const toWin = odds > 0 ? 15 * (odds/100) : 15 * (100/Math.abs(odds));
  return `+$${toWin.toFixed(2)}`;
}

function updateBuilderCount() {
  const ready = builderState.filter((s,i) => s.pick && s.odds.trim()).length;
  document.getElementById("builderReadyCount").textContent = ready;
}

function confirmBuilderBets() {
  let added = 0;
  DAY2_GAMES.forEach((g, i) => {
    const s = builderState[i];
    if (!s.pick || !s.odds.trim()) return;
    const odds = parseFloat(s.odds);
    if (!odds) return;
    const pick = s.pick === "team1" ? g.team1 : g.team2;
    const opponent = s.pick === "team1" ? g.team2 : g.team1;
    const toWin = odds > 0 ? 15*(odds/100) : 15*(100/Math.abs(odds));
    const toWinR = Math.round(toWin*100)/100;
    const payout = Math.round((15+toWinR)*100)/100;
    const oddsStr = odds > 0 ? `+${odds}` : `${odds}`;
    const newId = Math.max(...bets.map(b => b.id), 0) + 1 + added;
    bets.push({ id: newId, pick, opponent, betType:"ML", odds: oddsStr, risk:15, toWin:toWinR, payout, status:"pending" });
    added++;
  });
  if (added === 0) { alert("Select a team and enter odds for at least one game."); return; }
  localStorage.setItem('mm2026_day2done', '1');
  saveBets(); render();
  document.getElementById("builderSection").style.display = "none";
  renderAdminContent();
}

// ─── Close modal on overlay click ─────────────────────────────────────────────
document.getElementById("adminModal").addEventListener("click", function(e) {
  if (e.target === this) closeAdmin();
});

init();
</script>
